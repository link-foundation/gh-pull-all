name: Checks and release

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  # npm trusted publishing is configured for this workflow filename.
  # Keep automated and manual publishing in release.yml so the trusted
  # publisher has a single, stable workflow entry point.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: npm run check:syntax

      - name: Check file line limits
        run: npm run check:line-limits

      - name: Run tests
        run: npm run test:ci

  release:
    name: Release
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      !cancelled() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      ) &&
      needs.test.result == 'success'
    permissions:
      contents: write
      id-token: write
    outputs:
      published: ${{ steps.publish.outputs.published }}
      published_version: ${{ steps.publish.outputs.published_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Update npm for OIDC trusted publishing
        run: node scripts/setup-npm.mjs

      - name: Check if release is needed
        id: check_release
        run: node scripts/check-release-needed.mjs

      - name: Publish to npm
        id: publish
        if: github.event_name == 'workflow_dispatch' || steps.check_release.outputs.should_release == 'true'
        env:
          # Optional first-publish/bootstrap fallback. Trusted publishing is the
          # steady-state path, but NODE_AUTH_TOKEN lets maintainers recover if
          # npm rejects OIDC before package trust is fully established.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-to-npm.mjs

      - name: Smoke-test published npm package
        if: steps.publish.outputs.published == 'true'
        run: node scripts/smoke-test-package.mjs --package-version "${{ steps.publish.outputs.published_version }}"

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/create-github-release.mjs --release-version "${{ steps.publish.outputs.published_version }}" --repository "${{ github.repository }}"
